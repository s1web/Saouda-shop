<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Statistiques - Boutique Fashion</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header>
  <div class="logo">Boutique Fashion</div>

  <nav>
       <ul>
            <li><a href="orders.html">📊 Commandes clients</a></li>
            <li><a href="admin.html">← Admin - Gestion des produits</a></li>
       </ul>
  </nav>
</header>

<section class="admin-container">

<h2>📊 Statistiques des ventes</h2>

<div class="stats-grid">

    <div class="stat-card">
        <h3>💰 Revenus</h3>
        <p id="totalRevenue">0 €</p>
    </div>

    <div class="stat-card">
        <h3>📦 Commandes</h3>
        <p id="totalOrders">0</p>
    </div>

    <div class="stat-card">
        <h3>🚚 En cours</h3>
        <p id="ordersProgress">0</p>
    </div>

    <div class="stat-card">
        <h3>✅ Livrées</h3>
        <p id="ordersDelivered">0</p>
    </div>

</div>

</section>

<script type="module">

import { db } from '../firebase-config.js';
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function loadStats(){

    let totalRevenue = 0;
    let totalOrders = 0;
    let enCours = 0;
    let livrees = 0;

    const snap = await getDocs(collection(db, "orders"));

    snap.forEach(doc => {

        const o = doc.data();

        totalOrders++;

        totalRevenue += o.total || 0;

        if(o.status === "En cours") enCours++;
        if(o.status === "Livrée") livrees++;
    });

    // 🔥 AFFICHAGE
    document.getElementById("totalRevenue").textContent = totalRevenue + " €";
    document.getElementById("totalOrders").textContent = totalOrders;
    document.getElementById("ordersProgress").textContent = enCours;
    document.getElementById("ordersDelivered").textContent = livrees;
}

loadStats();

</script>

</body>
</html>
