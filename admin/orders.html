<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Commandes</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header>
  <div class="logo">Boutique Fashion</div>

  <nav>
       <ul>
            <li><a href="stats.html">Statistiques des ventes</a></li>
            <li><a href="admin.html">← Admin - Gestion des produits</a></li>
       </ul>
  </nav>
</header>

<section class="admin-container">

<h2>📊 Commandes clients</h2>

<div id="notifBox" class="notif-box">
    🔔 Commandes : <span id="notifCount">0</span>
</div>

<!-- 🔥 GRID -->
<div id="orders-list" class="orders-grid"></div>

</section>

<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module">

import { db } from '../firebase-config.js';
import { collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const container = document.getElementById("orders-list");
const notifCount = document.getElementById("notifCount");
const sound = document.getElementById("notifSound");

let previousCount = 0;

const q = query(collection(db, "orders"), orderBy("date", "desc"));

onSnapshot(q, (snapshot) => {

    container.innerHTML = "";

    let count = snapshot.size;
    notifCount.textContent = count;

    if (count > previousCount && previousCount !== 0) {
        sound.play();
        alert("📦 Nouvelle commande !");
    }

    previousCount = count;

    snapshot.forEach(docItem => {

        const o = docItem.data();

        let productsHTML = "";

        o.cart.forEach(item => {
            let qty = item.quantity || 1;

            productsHTML += `
                <div class="order-product">
                    <img src="${item.img}" width="50">
                    <div>
                        <p><b>${item.name}</b></p>
                        <p>${qty} x ${item.price} €</p>
                    </div>
                </div>
            `;
        });

        const div = document.createElement("div");
        div.classList.add("order-card");

        div.innerHTML = `
            <h3>${o.nom} ${o.prenom}</h3>
            <p>📞 ${o.telephone}</p>
            <p>💰 <b>${o.total} €</b></p>

            <p>📦 Statut : <b>${o.status}</b></p>

            <div class="status-buttons">
                <button onclick="updateStatus('${docItem.id}','En attente','${o.telephone}','${o.nom}')">En attente</button>
                <button onclick="updateStatus('${docItem.id}','En cours','${o.telephone}','${o.nom}')">En cours</button>
                <button onclick="updateStatus('${docItem.id}','Livrée','${o.telephone}','${o.nom}')">Livrée</button>
            </div>

            <!-- 🔥 SUPPRIMER -->
            <button onclick="deleteOrder('${docItem.id}')" class="btn-delete">
                🗑️ Supprimer
            </button>

            <div class="products-list">
                ${productsHTML}
            </div>
        `;

        container.appendChild(div);
    });

});

// ==========================
// 🔄 STATUT + WHATSAPP CLIENT
// ==========================
async function updateStatus(id, status, phone, nom){

    const ref = doc(db, "orders", id);

    await updateDoc(ref, { status });

    // 🔥 MESSAGE ADAPTÉ
    let message = "";

    if(status === "En attente"){
        message = `Bonjour ${nom} 👋\nVotre commande est bien reçue ✅\nNous la préparons.`;
    }

    if(status === "En cours"){
        message = `Bonjour ${nom} 👋\nVotre commande est en cours de livraison 🚚`;
    }

    if(status === "Livrée"){
        message = `Bonjour ${nom} 👋\nVotre commande a été livrée ✅\nMerci pour votre confiance 🙏`;
    }

    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

// ==========================
// 🗑️ SUPPRESSION
// ==========================
async function deleteOrder(id){

    if(confirm("Supprimer cette commande ?")){

        await deleteDoc(doc(db, "orders", id));
    }
}

window.updateStatus = updateStatus;
window.deleteOrder = deleteOrder;

</script>

</body>
</html>
